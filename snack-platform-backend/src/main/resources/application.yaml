spring:
  application:
    name: snack-platform-backend
  
  # 数据源配置 - 生产环境必须设置环境变量
  # 开发环境可使用 spring.profiles.active=dev 激活开发配置
  datasource:
    url: ${DB_URL:}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.snackchain.snack_platform_backend.entity
  configuration:
    map-underscore-to-camel-case: true
    # 生产环境应移除或使用 SLF4J
    log-impl: ${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.slf4j.Slf4jImpl}
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置 - 生产环境必须设置 JWT_SECRET 环境变量
jwt:
  secret: ${JWT_SECRET:}
  expiration: ${JWT_EXPIRATION:86400000}  # 24小时，单位毫秒

# 服务器配置
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

# 日志配置 - 生产环境使用 info 级别
logging:
  level:
    com.snackchain: ${LOG_LEVEL:info}
    org.springframework.security: ${SECURITY_LOG_LEVEL:warn}

# CORS配置 - 生产环境应限制为实际域名
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# Actuator 配置 - 限制端点暴露
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
    info:
      enabled: true
  # 禁用敏感端点
  server:
    port: ${MANAGEMENT_PORT:8081}  # 使用独立端口，生产环境可设置为内网端口

---
# 开发环境配置
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://localhost:3306/snack_platform?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root

jwt:
  secret: dev-only-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm-dev

# 开发环境允许显示测试账号
app:
  show-test-accounts: true
